<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeriLife - Trust & Decision Intelligence</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Direct fallback rendering for Lucide icons to ensure execution doesn't block layout
    function Icon({ name, className }) {
      useEffect(() => {
        try {
          if (window.lucide && typeof window.lucide.createIcons === 'function') {
            window.lucide.createIcons();
          }
        } catch (e) {
          console.error("Lucide rendering error:", e);
        }
      }, [name]);
      return <i data-lucide={name} className={className}></i>;
    }

    function VeriLifeApp() {
      const [currentView, setCurrentView] = useState('landing');
      const [searchQuery, setSearchQuery] = useState('');
      const [activeAnalysisId, setActiveAnalysisId] = useState(1);

      const [prebuiltAnalyses, setPrebuiltAnalyses] = useState([
        {
          id: 1,
          question: "How likely am I to make it in dropshipping at 17?",
          status: "Risky",
          statusColor: "text-amber-700 bg-amber-50 border-amber-200",
          percentage: 42,
          summary: "Based on our analysis of current market trends, youth entrepreneurial demographics, and historical supply chain failure rates, this path shows limited immediate margin potential and carries heavy upfront marketing risk.",
          checks: [
            { label: "Market Viability Verified", status: true },
            { label: "Clear Risk Mitigation Strategy", status: false },
            { label: "Low Financial Exposure", status: false },
            { label: "Positive Community Feedback", status: true }
          ]
        },
        {
          id: 2,
          question: "Investing $1k into Index Funds vs Crypto",
          status: "Safe",
          statusColor: "text-emerald-700 bg-emerald-50 border-emerald-200",
          percentage: 78,
          summary: "Data indicates strong underlying stability with index fund baselines compensating for crypto volatility. Recommended allocation favors high-probability risk-managed wealth accumulation.",
          checks: [
            { label: "Market Viability Verified", status: true },
            { label: "Clear Risk Mitigation Strategy", status: true },
            { label: "Low Financial Exposure", status: true },
            { label: "Positive Community Feedback", status: false }
          ]
        },
        {
          id: 3,
          question: "Moving to a new city for a junior dev role",
          status: "High Probability",
          statusColor: "text-green-700 bg-green-50 border-green-200",
          percentage: 85,
          summary: "Macroeconomic indicators show rapid tech ecosystem expansion in the target destination. Career compounding metrics heavily outweigh short-term relocation friction.",
          checks: [
            { label: "Market Viability Verified", status: true },
            { label: "Clear Risk Mitigation Strategy", status: true },
            { label: "Low Financial Exposure", status: false },
            { label: "Positive Community Feedback", status: true }
          ]
        },
        {
          id: 4,
          question: "Starting a software agency with no capital",
          status: "Low Probability",
          statusColor: "text-rose-700 bg-rose-50 border-rose-200",
          percentage: 29,
          summary: "High market saturation and long organic pipeline delays generate severe initial cashflow strain. Real-time patterns suggest securing an initial anchor client prior to full operational scaling.",
          checks: [
            { label: "Market Viability Verified", status: false },
            { label: "Clear Risk Mitigation Strategy", status: false },
            { label: "Low Financial Exposure", status: true },
            { status: false, label: "Positive Community Feedback" }
          ]
        }
      ]);

      const currentAnalysis = prebuiltAnalyses.find(a => a.id === activeAnalysisId) || prebuiltAnalyses[0];

      const radius = 50;
      const circumference = 2 * Math.PI * radius;
      const strokeDashoffset = circumference - (currentAnalysis.percentage / 100) * circumference;

      const handleAnalyze = (e) => {
        if (e) e.preventDefault();
        if (!searchQuery.trim()) return;

        const generatedPercentage = Math.floor(Math.random() * (95 - 20 + 1)) + 20;
        let status = "Moderate";
        let statusColor = "text-emerald-700 bg-emerald-50 border-emerald-200";

        if (generatedPercentage < 45) {
          status = "Risky";
          statusColor = "text-rose-700 bg-rose-50 border-rose-200";
        } else if (generatedPercentage > 75) {
          status = "High Stability";
          statusColor = "text-green-700 bg-green-50 border-green-200";
        }

        const newAnalysis = {
          id: Date.now(),
          question: searchQuery,
          status,
          statusColor,
          percentage: generatedPercentage,
          summary: "Analysis complete for structural index parameter items. Structural safety rating estimated.",
          checks: [
            { label: "Market Viability Verified", status: generatedPercentage > 40 },
            { label: "Clear Risk Mitigation Strategy", status: generatedPercentage > 60 },
            { label: "Low Financial Exposure", status: true },
            { label: "Positive Community Feedback", status: generatedPercentage > 50 }
          ]
        };

        setPrebuiltAnalyses([newAnalysis, ...prebuiltAnalyses]);
        setActiveAnalysisId(newAnalysis.id);
        setSearchQuery('');
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased">
          
          {/* LANDING VIEW */}
          {currentView === 'landing' && (
            <div className="bg-white min-h-screen">
              <nav className="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between border-b border-slate-100">
                <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setCurrentView('landing')}>
                  <div className="w-9 h-9 flex items-center justify-center rounded-xl bg-gradient-to-br from-green-500 to-emerald-600 text-white font-bold text-lg">
                    VL
                  </div>
                  <span className="text-xl font-bold text-slate-900">VeriLife</span>
                </div>

                <div className="flex items-center space-x-4">
                  <button onClick={() => setCurrentView('dashboard')} className="text-sm font-semibold bg-green-600 text-white px-5 py-2.5 rounded-xl">
                    Get Started
                  </button>
                </div>
              </nav>

              <div className="max-w-7xl mx-auto px-4 pt-16 pb-24 text-center lg:text-left">
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
                  <div className="lg:col-span-7 space-y-8">
                    <div className="inline-flex items-center space-x-2 px-3 py-1.5 rounded-full bg-green-50 border border-green-100 text-xs font-semibold text-green-700">
                      <Icon name="sparkles" className="w-3.5 h-3.5" />
                      <span>AI-POWERED TRUST & DECISION INTELLIGENCE</span>
                    </div>

                    <h1 className="text-4xl sm:text-5xl lg:text-6xl font-black text-slate-900 tracking-tight leading-[1.12]">
                      Make Smarter Decisions.<br />
                      Live a <span className="text-green-600">Safer</span> Life.
                    </h1>

                    <p className="text-base sm:text-lg text-slate-600 max-w-2xl mx-auto lg:mx-0 leading-relaxed">
                      VeriLife helps you verify, analyze, and decide with confidence. Avoid scams, verify variables, and make better choices with continuous macro modeling.
                    </p>

                    <div className="flex justify-center lg:justify-start">
                      <button onClick={() => setCurrentView('dashboard')} className="inline-flex items-center space-x-2 px-7 py-4 rounded-xl bg-green-600 text-white font-bold shadow-xl shadow-green-600/20">
                        <span>Open Dashboard</span>
                        <Icon name="arrow-right" className="w-4 h-4" />
                      </button>
                    </div>
                  </div>

                  <div className="lg:col-span-5 relative flex justify-center">
                    <div className="w-full max-w-[340px] rounded-[40px] border-[8px] border-slate-900 bg-slate-900 p-3 shadow-2xl">
                      <div className="rounded-[30px] overflow-hidden bg-white p-4 space-y-4 text-left">
                        <div className="flex justify-between items-center text-xs text-slate-400 pb-2 border-b border-slate-100">
                          <span className="font-bold text-green-600">VeriLife Preview</span>
                          <div className="w-3 h-3 rounded-full bg-slate-200" />
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs text-slate-600 flex items-center justify-between">
                          <span className="truncate">Evaluating Dropshipping Strategies...</span>
                          <Icon name="sparkles" className="w-3.5 h-3.5 text-green-500" />
                        </div>
                        <div className="bg-green-50/50 border border-green-100 rounded-xl p-3 text-center">
                          <div className="text-2xl font-black text-green-600">42%</div>
                          <div className="text-[10px] text-amber-800 font-semibold">Risky Profile Matrix</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* DASHBOARD VIEW */}
          {currentView === 'dashboard' && (
            <div className="flex h-screen overflow-hidden bg-slate-50">
              
              {/* Desktop Sidebar */}
              <aside className="w-64 bg-white border-r border-slate-200 flex-col justify-between hidden lg:flex">
                <div>
                  <div className="h-20 px-6 flex items-center space-x-3 border-b border-slate-100 cursor-pointer" onClick={() => setCurrentView('landing')}>
                    <div className="w-7 h-7 flex items-center justify-center rounded-lg bg-green-600 text-white font-bold text-xs">
                      VL
                    </div>
                    <span className="text-lg font-bold text-slate-900">VeriLife</span>
                  </div>

                  <nav className="p-4 space-y-1">
                    <button className="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-bold text-green-700 bg-green-50 border border-green-100">
                      <Icon name="layout-dashboard" className="w-4 h-4" />
                      <span>Decision Maker</span>
                    </button>
                  </nav>
                </div>
              </aside>

              {/* Main Content Pane */}
              <main className="flex-1 flex flex-col overflow-y-auto">
                <header className="h-20 border-b border-slate-200 px-6 flex items-center justify-between bg-white shrink-0 shadow-sm">
                  <div>
                    <h2 className="text-xl font-bold text-slate-900">Decision Maker</h2>
                    <p className="text-xs text-slate-500">Get AI-powered insights & metrics.</p>
                  </div>
                  <button onClick={() => setCurrentView('landing')} className="text-xs font-bold px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-slate-600">
                    Landing Page
                  </button>
                </header>

                <div className="p-4 sm:p-8 space-y-6 max-w-7xl w-full mx-auto">
                  
                  {/* Form */}
                  <form onSubmit={handleAnalyze} className="bg-white border border-slate-200 rounded-2xl p-5 space-y-4 shadow-sm">
                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">What scenario or strategy would you like to verify today?</label>
                    <div className="relative flex items-center">
                      <input 
                        type="text" 
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                        placeholder="Ask a question... (e.g., 'Investing $1k into Index Funds vs Crypto')" 
                        className="w-full bg-slate-50 border border-slate-200 focus:bg-white rounded-xl py-3.5 pl-4 pr-32 text-sm text-slate-900 outline-none transition"
                      />
                      <button type="submit" className="absolute right-2 px-4 py-2 bg-green-600 text-white rounded-lg text-xs font-bold flex items-center space-x-1.5">
                        <Icon name="sparkles" className="w-3.5 h-3.5" />
                        <span>Analyze</span>
                      </button>
                    </div>
                  </form>

                  {/* Grid layout */}
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    
                    {/* List */}
                    <div className="lg:col-span-5 bg-white border border-slate-200 rounded-2xl p-5 space-y-4 shadow-sm">
                      <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Recent Profile Analyses</h3>
                      <div className="space-y-2 max-h-[360px] overflow-y-auto">
                        {prebuiltAnalyses.map((item) => (
                          <button 
                            key={item.id}
                            type="button"
                            onClick={() => setActiveAnalysisId(item.id)}
                            className={"w-full p-3.5 rounded-xl border text-left transition flex flex-col gap-2 " + (activeAnalysisId === item.id ? "bg-green-50 border-green-400" : "bg-white border-slate-100 hover:bg-slate-50")}
                          >
                            <p className="text-xs font-bold text-slate-800 line-clamp-1">{item.question}</p>
                            <div className="flex justify-between items-center w-full">
                              <span className={"text-[10px] px-2 py-0.5 rounded-md border font-semibold " + item.statusColor}>
                                {item.status}
                              </span>
                              <span className="text-xs font-extrabold text-slate-500">{item.percentage}%</span>
                            </div>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Chart Indicator */}
                    <div className="lg:col-span-3 bg-white border border-slate-200 rounded-2xl p-5 shadow-sm flex flex-col justify-between text-center space-y-6">
                      <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Overall Trust Score</h3>
                      
                      <div className="relative flex items-center justify-center">
                        <svg className="w-36 h-36 transform -rotate-90">
                          <circle cx="72" cy="72" r={radius} stroke="#f1f5f9" strokeWidth="10" fill="transparent" />
                          <circle 
                            cx="72" cy="72" r={radius}
                            stroke="#22c55e"
                            strokeWidth="10" fill="transparent"
                            strokeDasharray={circumference}
                            strokeDashoffset={strokeDashoffset}
                            strokeLinecap="round"
                            style={{ transition: 'stroke-dashoffset 0.3s ease' }}
                          />
                        </svg>
                        <div className="absolute flex flex-col items-center justify-center">
                          <span className="text-4xl font-black text-slate-900">{currentAnalysis.percentage}</span>
                          <span className="text-[10px] text-slate-400 font-bold">/ 100</span>
                        </div>
                      </div>

                      <div>
                        <span className={"text-xs px-3 py-1 rounded-full border inline-block font-bold " + currentAnalysis.statusColor}>
                          {currentAnalysis.status} Matrix
                        </span>
                      </div>
                    </div>

                    {/* Recommendation Card */}
                    <div className="lg:col-span-4 bg-white border border-slate-200 rounded-2xl p-5 shadow-sm flex flex-col justify-between space-y-5">
                      <div className="space-y-3">
                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider">AI Recommendation</h3>
                        <div className="p-4 rounded-xl bg-slate-50 border border-slate-200 text-xs text-slate-600 leading-relaxed font-medium">
                          {currentAnalysis.summary}
                        </div>
                      </div>

                      <div className="space-y-2.5 border-t border-slate-100 pt-3">
                        {currentAnalysis.checks.map((check, idx) => (
                          <div key={idx} className="flex items-center justify-between text-xs px-1">
                            <span className="text-slate-500 font-medium">{check.label}</span>
                            <Icon 
                              name={check.status ? "check-circle" : "x-circle"} 
                              className={"w-4 h-4 " + (check.status ? "text-emerald-600" : "text-rose-500")} 
                            />
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                </div>
              </main>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<VeriLifeApp />);
  </script>
</body>
</html>
