<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeriLife - Trust & Decision Intelligence</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  
  <style>
    /* Baseline Tailwind additions for smooth layouts */
    @layer base {
      body {
        @apply bg-slate-50 font-sans antialiased text-slate-700;
      }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Helper component to easily inject Lucide icons via vanilla window distribution
    function Icon({ name, size = 16, className = "", strokeWidth = 2, fill = "none" }) {
      const elRef = React.useRef(null);

      useEffect(() => {
        if (elRef.current) {
          elRef.current.innerHTML = "";
          const camelToKebab = name.replace(/([a-z0-9]|(?=[A-Z]))([A-Z])/g, '$1-$2').toLowerCase();
          const iconKey = camelToKebab.replace(/-([a-z0-9])/g, g => g[1].toUpperCase());
          const targetIcon = window.lucide[name] || window.lucide[iconKey];

          if (targetIcon) {
            const [tag, attrs, children] = targetIcon;
            const svg = document.createElementNS("http://www.w3.org/2000/svg", tag);
            
            Object.entries({
              ...attrs,
              width: size,
              height: size,
              class: className,
              "stroke-width": strokeWidth,
              fill: fill
            }).forEach(([k, v]) => svg.setAttribute(k, v));

            if (children && children.length) {
              children.forEach(([cTag, cAttrs]) => {
                const childEl = document.createElementNS("http://www.w3.org/2000/svg", cTag);
                Object.entries(cAttrs).forEach(([ck, cv]) => childEl.setAttribute(ck, cv));
                svg.appendChild(childEl);
              });
            }
            elRef.current.appendChild(svg);
          }
        }
      }, [name, size, className, strokeWidth, fill]);

      return <span ref={elRef} className="inline-flex items-center justify-center" />;
    }

    // ─── MAIN CONTAINER ──────────────────────────────────────────────────────────
    function VeriLife() {
      const [view, setView] = useState("landing"); // "landing" | "dashboard"
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      return (
        <div className="font-sans antialiased bg-slate-50 min-h-screen">
          {view === "landing" ? (
            <LandingPage 
              onEnterApp={() => setView("dashboard")} 
              mobileMenuOpen={mobileMenuOpen} 
              setMobileMenuOpen={setMobileMenuOpen} 
            />
          ) : (
            <Dashboard onBack={() => setView("landing")} />
          )}
        </div>
      );
    }

    // ─── LANDING PAGE ────────────────────────────────────────────────────────────
    function LandingPage({ onEnterApp, mobileMenuOpen, setMobileMenuOpen }) {
      return (
        <div className="min-h-screen bg-slate-50 flex flex-col justify-between">
          <Navbar onEnterApp={onEnterApp} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenuOpen} />
          <Hero onEnterApp={onEnterApp} />
          <ShowcaseSection />
          <Footer />
        </div>
      );
    }

    function Navbar({ onEnterApp, mobileMenuOpen, setMobileMenuOpen }) {
      const links = ["Features", "How It Works", "Use Cases", "Pricing", "Blog", "About Us"];
      return (
        <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-slate-100">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 bg-green-600 rounded-lg flex items-center justify-center">
                <Icon name="Shield" size={18} className="text-white" strokeWidth={2.5} />
              </div>
              <span className="text-xl font-bold text-slate-900 tracking-tight">VeriLife</span>
            </div>

            <div className="hidden md:flex items-center gap-6">
              {links.map(l => (
                <a key={l} href="#" className="text-sm text-slate-600 hover:text-green-700 transition-colors font-medium">{l}</a>
              ))}
            </div>

            <div className="hidden md:flex items-center gap-3">
              <button className="text-sm font-medium text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-100 transition-colors">Log in</button>
              <button onClick={onEnterApp} className="text-sm font-semibold text-white bg-green-600 hover:bg-green-700 px-5 py-2 rounded-lg transition-colors shadow-sm">Get Started</button>
            </div>

            <button className="md:hidden text-slate-600 focus:outline-none" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
              {mobileMenuOpen ? <Icon name="X" size={22} /> : <Icon name="Menu" size={22} />}
            </button>
          </div>

          {mobileMenuOpen && (
            <div className="md:hidden bg-white border-t border-slate-100 px-4 py-4 flex flex-col gap-3 shadow-inner">
              {links.map(l => <a key={l} href="#" className="text-sm font-medium text-slate-700 py-1 px-2 hover:bg-slate-50 rounded-md">{l}</a>)}
              <div className="flex gap-3 pt-2">
                <button className="flex-1 text-sm font-medium text-slate-700 py-2 border border-slate-200 rounded-lg">Log in</button>
                <button onClick={() => { setMobileMenuOpen(false); onEnterApp(); }} className="flex-1 text-sm font-semibold text-white bg-green-600 py-2 rounded-lg">Get Started</button>
              </div>
            </div>
          )}
        </nav>
      );
    }

    function Hero({ onEnterApp }) {
      const features = [
        { icon: "Zap", label: "AI Risk Analysis" },
        { icon: "BadgeCheck", label: "Identity Verification" },
        { icon: "AlertTriangle", label: "Scam Detection" },
        { icon: "Star", label: "Reputation Scores" },
      ];

      return (
        <section className="relative overflow-hidden bg-white pt-12 pb-20 flex-1 flex items-center">
          <div className="absolute inset-0 pointer-events-none">
            <div className="absolute -top-40 -right-40 w-[650px] h-[650px] rounded-full bg-green-50 opacity-70" />
            <div className="absolute -bottom-20 -left-20 w-[400px] h-[400px] rounded-full bg-green-50 opacity-50" />
          </div>

          <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
            <div className="lg:grid lg:grid-cols-2 lg:gap-16 items-center">
              <div className="max-w-xl">
                <span className="inline-flex items-center gap-2 bg-green-50 text-green-700 text-xs font-semibold px-3 py-1.5 rounded-full mb-6 border border-green-200">
                  <Icon name="Sparkles" size={12} />
                  AI-Powered Trust & Decision Intelligence
                </span>

                <h1 className="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-slate-900 leading-tight tracking-tight mb-6">
                  Make Smarter<br />Decisions.<br />Live a{" "}
                  <span className="text-green-600">Safer</span> Life.
                </h1>

                <p className="text-base sm:text-lg text-slate-500 mb-8 leading-relaxed">
                  VeriLife uses advanced AI to instantly verify links, phone numbers, emails, and more — giving you the confidence to act without doubt.
                </p>

                <div className="flex flex-wrap gap-3 mb-10">
                  <button onClick={onEnterApp} className="inline-flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-xl transition-all shadow-lg shadow-green-200 text-sm">
                    Start Free Analysis <Icon name="ArrowRight" size={16} />
                  </button>
                  <button className="inline-flex items-center gap-2 text-slate-700 font-semibold border border-slate-200 hover:border-slate-300 px-6 py-3 rounded-xl transition-all text-sm bg-white">
                    <div className="w-6 h-6 bg-slate-900 rounded-full flex items-center justify-center">
                      <Icon name="Play" size={10} className="text-white ml-0.5" fill="white" />
                    </div>
                    Watch Demo
                  </button>
                </div>

                <div className="flex flex-wrap gap-x-5 gap-y-2 border-t border-slate-100 pt-6">
                  {features.map(f => (
                    <span key={f.label} className="inline-flex items-center gap-1.5 text-xs text-slate-500 font-medium">
                      <span className="text-green-600"><Icon name={f.icon} size={14} /></span>
                      {f.label}
                    </span>
                  ))}
                </div>
              </div>

              <div className="relative mt-16 lg:mt-0 flex justify-center lg:justify-end">
                <PhoneMockup />

                <div className="absolute -left-4 bottom-10 bg-green-600 text-white rounded-2xl p-4 shadow-xl w-56 hidden sm:block">
                  <div className="flex items-center gap-2 mb-1">
                    <Icon name="Shield" size={14} className="text-green-200" />
                    <span className="text-xs font-semibold text-green-100">Trusted by thousands</span>
                  </div>
                  <div className="text-2xl font-bold mb-1">12,458+</div>
                  <div className="text-xs text-green-200 mb-3">Analyses completed today</div>
                  <svg viewBox="0 0 80 24" className="w-full h-6 opacity-70">
                    <polyline points="0,20 15,14 30,16 45,8 60,10 75,4 80,6" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </div>

                <div className="absolute -left-4 top-8 bg-white rounded-2xl p-3 shadow-lg flex items-center gap-3 border border-slate-100 hidden sm:flex">
                  <div className="flex -space-x-2">
                    {["#16a34a","#0ea5e9","#f59e0b","#8b5cf6"].map((c, i) => (
                      <div key={i} className="w-7 h-7 rounded-full border-2 border-white flex items-center justify-center text-white text-xs font-bold" style={{ backgroundColor: c }}>
                        {["A","B","C","D"][i]}
                      </div>
                    ))}
                  </div>
                  <div>
                    <div className="flex text-yellow-400 text-xs leading-none">★★★★★</div>
                    <div className="text-xs font-bold text-slate-800">4.9/5</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function PhoneMockup() {
      const actions = [
        { icon: "Link2", label: "Link" },
        { icon: "Phone", label: "Phone" },
        { icon: "Mail", label: "Email" },
        { icon: "FileText", label: "Doc" },
      ];
      return (
        <div className="relative w-64 h-[480px] bg-slate-900 rounded-[40px] shadow-2xl border-4 border-slate-700 overflow-hidden flex flex-col">
          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-24 h-5 bg-slate-900 rounded-b-2xl z-10" />

          <div className="flex-1 bg-gradient-to-b from-slate-800 to-slate-900 p-5 pt-8 flex flex-col">
            <div className="flex items-center justify-between mb-6">
              <div className="flex items-center gap-1.5">
                <Icon name="Shield" size={14} className="text-green-400" />
                <span className="text-green-400 text-xs font-bold">VeriLife</span>
              </div>
              <Icon name="Bell" size={13} className="text-slate-400" />
            </div>

            <div className="text-white font-bold text-base leading-snug mb-1">Analyze Anything.</div>
            <div className="text-green-400 font-bold text-base leading-snug mb-5">Decide Everything.</div>

            <div className="bg-slate-700/60 rounded-xl p-3 flex items-center gap-2 mb-4">
              <Icon name="Search" size={12} className="text-slate-400" />
              <span className="text-slate-400 text-xs">Paste a link or number...</span>
            </div>

            <div className="grid grid-cols-2 gap-2 mb-5">
              {actions.map(a => (
                <div key={a.label} className="bg-slate-700/50 hover:bg-slate-600/50 transition-colors rounded-xl p-2.5 flex flex-col items-center gap-1 cursor-pointer">
                  <span className="text-green-400"><Icon name={a.icon} size={14} /></span>
                  <span className="text-slate-300 text-xs font-medium">{a.label}</span>
                </div>
              ))}
            </div>

            <div className="bg-green-600/20 border border-green-600/30 rounded-xl p-3">
              <div className="flex items-center gap-2 mb-1">
                <Icon name="CheckCircle" size={12} className="text-green-400" />
                <span className="text-green-400 text-xs font-semibold">Safe</span>
              </div>
              <div className="text-slate-300 text-xs">+234 812 345 6789</div>
              <div className="text-slate-500 text-xs">Verified · Low Risk</div>
            </div>
          </div>

          <div className="h-6 bg-slate-900 flex items-center justify-center">
            <div className="w-20 h-1 bg-slate-600 rounded-full" />
          </div>
        </div>
      );
    }

    function ShowcaseSection() {
      const cards = [
        { icon: "AlertTriangle", colorClass: "text-red-500", title: "Scam Protection", desc: "Real-time alerts before you fall victim.", bg: "bg-red-50 border-red-100", accent: "text-red-700" },
        { icon: "Sparkles", colorClass: "text-green-600", title: "AI Decision Maker", desc: "Instant AI analysis of any input.", bg: "bg-green-50 border-green-100", accent: "text-green-700" },
        { icon: "Globe", colorClass: "text-green-600", title: "Global Trust Network", desc: "Community-sourced reputation data.", bg: "bg-green-50 border-green-100", accent: "text-green-700" },
      ];

      return (
        <section className="py-16 bg-slate-50 border-t border-slate-100">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="text-center mb-12">
              <h2 className="text-3xl font-extrabold text-slate-900 mb-3">Why people trust VeriLife</h2>
              <p className="text-slate-500 text-sm max-w-xl mx-auto">Three pillars that keep you protected across every digital interaction.</p>
            </div>
            <div className="grid sm:grid-cols-3 gap-6">
              {cards.map(c => (
                <div key={c.title} className={`rounded-2xl border p-6 ${c.bg}`}>
                  <div className="w-10 h-10 rounded-xl bg-white flex items-center justify-center shadow-sm mb-4">
                    <Icon name={c.icon} size={18} className={c.colorClass} />
                  </div>
                  <h3 className={`font-bold text-base mb-1 ${c.accent}`}>{c.title}</h3>
                  <p className="text-slate-500 text-xs sm:text-sm leading-relaxed">{c.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="bg-slate-900 text-slate-400 py-8 px-6 text-center text-xs border-t border-slate-800">
          <div className="flex items-center justify-center gap-2 mb-3">
            <div className="w-6 h-6 bg-green-600 rounded-md flex items-center justify-center">
              <Icon name="Shield" size={13} className="text-white" />
            </div>
            <span className="text-white font-bold">VeriLife</span>
          </div>
          <p>© 2026 VeriLife Inc. · Privacy Policy · Terms of Service</p>
        </footer>
      );
    }

    // ─── DASHBOARD ───────────────────────────────────────────────────────────────
    function Dashboard({ onBack }) {
      const [activeNav, setActiveNav] = useState("Decision Maker");
      const [analyzeInput, setAnalyzeInput] = useState("");
      const [activeTab, setActiveTab] = useState("Link");
      const [sidebarOpen, setSidebarOpen] = useState(false);

      const navItems = [
        { label: "Decision Maker", icon: "Sparkles" },
        { label: "Verifications", icon: "BadgeCheck" },
        { label: "Scans", icon: "Search" },
        { label: "Watchlist", icon: "BookMarked" },
        { label: "My Reputation", icon: "User" },
        { label: "Messages", icon: "MessageSquare", badge: 3 },
        { label: "Reports", icon: "ClipboardList" },
        { label: "Settings", icon: "Settings" },
      ];

      const analysisTabs = [
        { label: "Link", icon: "Link2" },
        { label: "Phone Number", icon: "Phone" },
        { label: "Email", icon: "Mail" },
        { label: "Username", icon: "User" },
        { label: "Document", icon: "FileText" },
        { label: "Text", icon: "BookOpen" },
      ];

      const recentAnalyses = [
        { icon: "Phone", label: "+234 812 345 6789", type: "Phone", status: "Safe", color: "text-green-600 bg-green-50 border-green-200" },
        { icon: "Mail", label: "joboffer@example.com", type: "Email", status: "Risky", color: "text-orange-600 bg-orange-50 border-orange-200" },
        { icon: "Link2", label: "invest-winner.com", type: "Website", status: "Danger", color: "text-red-600 bg-red-50 border-red-200" },
        { icon: "FileText", label: "Real Estate Proposal", type: "Document", status: "Safe", color: "text-green-600 bg-green-50 border-green-200" },
      ];

      return (
        <div className="flex h-screen bg-slate-100 overflow-hidden relative">
          {sidebarOpen && (
            <div className="fixed inset-0 bg-slate-900/40 z-40 lg:hidden backdrop-blur-xs" onClick={() => setSidebarOpen(false)} />
          )}

          {/* Sidebar Drawer */}
          <aside className={`
            fixed lg:static inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 flex flex-col transition-transform duration-200 ease-in-out
            ${sidebarOpen ? "translate-x-0" : "-translate-x-full lg:translate-x-0"}
          `}>
            <div className="h-16 flex items-center justify-between px-5 border-b border-slate-100 flex-shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-green-600 rounded-lg flex items-center justify-center">
                  <Icon name="Shield" size={16} className="text-white" strokeWidth={2.5} />
                </div>
                <span className="text-lg font-extrabold text-slate-900 tracking-tight">VeriLife</span>
              </div>
              <button className="lg:hidden text-slate-400 p-1 rounded-md hover:bg-slate-50" onClick={() => setSidebarOpen(false)}>
                <Icon name="X" size={18} />
              </button>
            </div>

            <nav className="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
              {navItems.map(item => (
                <button
                  key={item.label}
                  onClick={() => { setActiveNav(item.label); setSidebarOpen(false); }}
                  className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${
                    activeNav === item.label
                      ? "bg-green-50 text-green-700"
                      : "text-slate-600 hover:bg-slate-50 hover:text-slate-900"
                  }`}
                >
                  <span className="flex items-center gap-3"><Icon name={item.icon} size={16} />{item.label}</span>
                  {item.badge && (
                    <span className="text-xs bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center font-bold">{item.badge}</span>
                  )}
                </button>
              ))}
            </nav>

            <div className="p-3 border-t border-slate-100">
              <div className="bg-gradient-to-br from-green-600 to-green-800 rounded-2xl p-4 text-white">
                <div className="flex items-center gap-2 mb-2">
                  <Icon name="Star" size={14} className="text-yellow-300" fill="#fde047" />
                  <span className="text-xs font-bold text-green-100">Go Premium</span>
                </div>
                <p className="text-xs text-green-100 mb-3 leading-relaxed">Unlock unlimited analyses, priority AI configuration, and metrics updates.</p>
                <button className="w-full bg-white text-green-700 text-xs font-bold py-2 rounded-lg hover:bg-green-50 transition-colors">
                  Upgrade Now
                </button>
              </div>
            </div>
          </aside>

          {/* Main Space Layout */}
          <div className="flex-1 flex flex-col overflow-hidden">
            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 flex-shrink-0">
              <div className="flex items-center gap-3">
                <button className="lg:hidden text-slate-500 p-1 hover:bg-slate-50 rounded-lg" onClick={() => setSidebarOpen(true)}>
                  <Icon name="Menu" size={20} />
                </button>
                <div>
                  <h1 className="font-extrabold text-slate-900 text-base sm:text-lg leading-none">{activeNav}</h1>
                  <p className="text-xs text-slate-400 mt-1 hidden sm:block">Get real-time indicators to verify actions safety.</p>
                </div>
              </div>

              <div className="flex items-center gap-2 sm:gap-3">
                <button className="hidden sm:flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
                  <Icon name="Plus" size={14} /> New Analysis
                </button>
                <button className="relative p-2 text-slate-500 hover:bg-slate-100 rounded-lg">
                  <Icon name="Bell" size={18} />
                  <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full" />
                </button>
                <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 cursor-pointer hover:bg-slate-100 transition-colors">
                  <div className="w-7 h-7 bg-green-600 rounded-full flex items-center justify-center text-white text-xs font-bold">D</div>
                  <div className="hidden sm:block">
                    <div className="text-xs font-semibold text-slate-800 leading-none">David O.</div>
                    <div className="text-[10px] text-green-600 font-medium mt-0.5">Premium User</div>
                  </div>
                </div>
              </div>
            </header>

            <main className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
              <div className="bg-white rounded-2xl p-4 sm:p-6 shadow-xs border border-slate-200/60">
                <h2 className="text-sm font-semibold text-slate-500 mb-3">What do you want to analyze today?</h2>
                <div className="flex items-center gap-3 border border-slate-200 rounded-xl px-4 py-2 bg-slate-50 focus-within:border-green-400 focus-within:ring-2 focus-within:ring-green-100 transition-all mb-4">
                  <Icon name="Search" size={16} className="text-slate-400 flex-shrink-0" />
                  <input
                    value={analyzeInput}
                    onChange={e => setAnalyzeInput(e.target.value)}
                    placeholder="Paste link, phone number, email or username..."
                    className="flex-1 text-sm text-slate-700 placeholder-slate-400 outline-none bg-transparent py-1.5"
                  />
                  <button className="flex items-center gap-1.5 bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors flex-shrink-0 shadow-sm">
                    <Icon name="Sparkles" size={13} /> Analyze
                  </button>
                </div>

                <div className="flex flex-wrap gap-2">
                  {analysisTabs.map(t => (
                    <button
                      key={t.label}
                      onClick={() => setActiveTab(t.label)}
                      className={`flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-lg border transition-colors ${
                        activeTab === t.label
                          ? "bg-green-50 border-green-300 text-green-700"
                          : "bg-white border-slate-200 text-slate-500 hover:border-slate-300"
                      }`}
                    >
                      <Icon name={t.icon} size={13} /> {t.label}
                    </button>
                  ))}
                </div>
              </div>

              <div className="grid lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl p-5 shadow-xs border border-slate-200/60">
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="font-bold text-slate-800 text-sm">Recent Analyses</h3>
                    <button className="text-xs text-green-600 font-medium hover:underline">View all</button>
                  </div>
                  <div className="space-y-3">
                    {recentAnalyses.map((a, i) => (
                      <div key={i} className="flex items-center justify-between py-2 border-b border-slate-50 last:border-0">
                        <div className="flex items-center gap-2.5 min-w-0">
                          <div className="w-7 h-7 rounded-lg bg-slate-100 flex items-center justify-center flex-shrink-0 text-slate-500">
                            <Icon name={a.icon} size={14} />
                          </div>
                          <div className="min-w-0">
                            <div className="text-xs font-medium text-slate-800 truncate">{a.label}</div>
                            <div className="text-[11px] text-slate-400 mt-0.5">{a.type}</div>
                          </div>
                        </div>
                        <span className={`text-xs font-semibold px-2 py-0.5 rounded-full border flex-shrink-0 ml-2 ${a.color}`}>{a.status}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white rounded-2xl p-5 shadow-xs border border-slate-200/60 flex flex-col items-center justify-between">
                  <h3 className="font-bold text-slate-800 text-sm self-start">Overall Trust Score</h3>
                  <TrustGauge score={78} />
                  <div className="text-center mt-2">
                    <div className="text-sm font-bold text-green-700 mb-0.5">Good Standing</div>
                    <div className="text-xs text-slate-400">Your network record is clear.</div>
                  </div>
                  <button className="w-full bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 text-xs font-semibold py-2.5 rounded-xl transition-colors mt-4">
                    View Full Report Details
                  </button>
                </div>

                <div className="bg-white rounded-2xl p-5 shadow-xs border border-slate-200/60 flex flex-col justify-between">
                  <div>
                    <h3 className="font-bold text-slate-800 text-sm mb-3">AI Recommendation</h3>
                    <div className="bg-green-50 border border-green-100 rounded-xl p-3.5 mb-4">
                      <div className="flex items-start gap-2.5">
                        <div className="w-6 h-6 bg-green-600 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">
                          <Icon name="Shield" size={12} className="text-white" />
                        </div>
                        <p className="text-xs text-slate-600 leading-relaxed">
                          Endpoint is <strong>verified</strong> as safe. Zero high-severity flags discovered on current parameters.
                        </p>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-2.5">
                    {["Identity Verified", "Clear History Check", "Low Risk Patterns", "Positive Networks"].map((item, i) => (
                      <div key={i} className="flex items-center gap-2">
                        <Icon name="CheckCircle" size={14} className="text-green-500 flex-shrink-0" />
                        <span className="text-xs text-slate-600 font-medium">{item}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="bg-gradient-to-r from-slate-900 to-slate-800 rounded-2xl p-5 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 shadow-md">
                <div className="flex items-center gap-4">
                  <div className="w-10 h-10 bg-green-600 rounded-xl flex items-center justify-center flex-shrink-0">
                    <Icon name="Lock" size={18} className="text-white" />
                  </div>
                  <div>
                    <h4 className="font-bold text-white text-sm sm:text-base">Stay protected. Stay informed.</h4>
                    <p className="text-slate-400 text-xs mt-0.5">Enable persistent endpoint verification across integrations.</p>
                  </div>
                </div>
                <button className="flex-shrink-0 bg-green-600 hover:bg-green-700 text-white font-semibold text-xs sm:text-sm px-5 py-2.5 rounded-xl transition-colors shadow-sm">
                  Enable Protection
                </button>
              </div>

              <button onClick={onBack} className="text-xs text-slate-400 hover:text-slate-600 transition-colors flex items-center gap-1 cursor-pointer pt-2">
                ← Back to landing page
              </button>
            </main>
          </div>
        </div>
      );
    }

    function TrustGauge({ score }) {
      const radius = 60;
      const circumference = Math.PI * radius;
      const progress = (score / 100) * circumference;
      const gap = circumference - progress;

      return (
        <div className="relative mt-2">
          <svg width="150" height="90" viewBox="0 0 150 90">
            <path
              d="M 15 80 A 60 60 0 0 1 135 80"
              fill="none"
              stroke="#f1f5f9"
              strokeWidth="12"
              strokeLinecap="round"
            />
            <path
              d="M 15 80 A 60 60 0 0 1 135 80"
              fill="none"
              stroke="#16a34a"
              strokeWidth="12"
              strokeLinecap="round"
              strokeDasharray={`${progress} ${gap}`}
            />
          </svg>
          <div className="absolute inset-0 flex items-center justify-center pt-6">
            <div className="text-center">
              <div className="text-2xl font-extrabold text-slate-900">{score}</div>
              <div className="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">/ 100</div>
            </div>
          </div>
        </div>
      );
    }

    // Mount the Application Context
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VeriLife />);
  </script>
</body>
</html>
