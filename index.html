<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeriLife - Trust & Decision Intelligence</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-700">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Direct, failsafe icon renderer matching Lucide setup
    function SafeIcon({ name, size = 16, className = "", strokeWidth = 2, fill = "none" }) {
      const iconRef = useRef(null);

      useEffect(() => {
        if (iconRef.current) {
          iconRef.current.innerHTML = "";
          // Handle dynamic casing fallback safely
          const cleanName = name.charAt(0).toUpperCase() + name.slice(1);
          const target = window.lucide[cleanName] || window.lucide[name];

          if (target) {
            const [tag, attrs, children] = target;
            const svg = document.createElementNS("http://www.w3.org/2000/svg", tag);
            
            Object.entries({
              ...attrs,
              width: size,
              height: size,
              class: className,
              "stroke-width": strokeWidth,
              fill: fill
            }).forEach(([k, v]) => svg.setAttribute(k, v));

            if (children && children.length) {
              children.forEach(([cTag, cAttrs]) => {
                const childEl = document.createElementNS("http://www.w3.org/2000/svg", cTag);
                Object.entries(cAttrs).forEach(([ck, cv]) => childEl.setAttribute(ck, cv));
                svg.appendChild(childEl);
              });
            }
            iconRef.current.appendChild(svg);
          }
        }
      }, [name, size, className, strokeWidth, fill]);

      return <span ref={iconRef} className="inline-flex items-center justify-center line-none" />;
    }

    // ─── MAIN APPLICATION ROUTER ──────────────────────────────────────────────────
    function VeriLifeApp() {
      const [view, setView] = useState("landing"); // "landing" | "dashboard"
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      return (
        <div className="min-h-screen bg-slate-50">
          {view === "landing" ? (
            <div className="min-h-screen flex flex-col justify-between">
              {/* Navbar */}
              <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-slate-100">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-green-600 rounded-lg flex items-center justify-center">
                      <SafeIcon name="Shield" size={18} className="text-white" strokeWidth={2.5} />
                    </div>
                    <span class="text-xl font-bold text-slate-900 tracking-tight">VeriLife</span>
                  </div>

                  <div class="hidden md:flex items-center gap-6">
                    {["Features", "How It Works", "Use Cases", "Pricing", "Blog", "About Us"].map(l => (
                      <a key={l} href="#" class="text-sm text-slate-600 hover:text-green-700 font-medium">{l}</a>
                    ))}
                  </div>

                  <div class="hidden md:flex items-center gap-3">
                    <button class="text-sm font-medium text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-100">Log in</button>
                    <button onClick={() => setView("dashboard")} class="text-sm font-semibold text-white bg-green-600 hover:bg-green-700 px-5 py-2 rounded-lg shadow-sm">Get Started</button>
                  </div>

                  <button class="md:hidden text-slate-600 focus:outline-none" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                    {mobileMenuOpen ? <SafeIcon name="X" size={22} /> : <SafeIcon name="Menu" size={22} />}
                  </button>
                </div>

                {mobileMenuOpen && (
                  <div class="md:hidden bg-white border-t border-slate-100 px-4 py-4 flex flex-col gap-3 shadow-sm">
                    {["Features", "How It Works", "Use Cases", "Pricing", "Blog", "About Us"].map(l => (
                      <a key={l} href="#" class="text-sm font-medium text-slate-700 py-1 px-2 hover:bg-slate-50 rounded-md">{l}</a>
                    ))}
                    <div class="flex gap-3 pt-2">
                      <button class="flex-1 text-sm font-medium text-slate-700 py-2 border border-slate-200 rounded-lg">Log in</button>
                      <button onClick={() => { setMobileMenuOpen(false); setView("dashboard"); }} class="flex-1 text-sm font-semibold text-white bg-green-600 py-2 rounded-lg">Get Started</button>
                    </div>
                  </div>
                )}
              </nav>

              {/* Hero */}
              <section class="relative overflow-hidden bg-white pt-12 pb-20 flex-1 flex items-center">
                <div class="absolute inset-0 pointer-events-none">
                  <div class="absolute -top-40 -right-40 w-[650px] h-[650px] rounded-full bg-green-50/70" />
                </div>

                <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
                  <div class="lg:grid lg:grid-cols-2 lg:gap-16 items-center">

                        <SafeIcon name="Sparkles" size={12} />

                      </span>

                      <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-slate-900 leading-tight tracking-tight mb-6">
                        Make Smarter<br />Decisions.<br />Live a <span class="text-green-600">Safer</span> Life.
                      </h1>

                      <p class="text-base sm:text-lg text-slate-500 mb-8 leading-relaxed">
                        VeriLife uses advanced AI to instantly verify links, phone numbers, emails, and more — giving you the confidence to act without doubt.
                      </p>

                      <div class="flex flex-wrap gap-3 mb-10">
                        <button onClick={() => setView("dashboard")} class="inline-flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-xl shadow-lg shadow-green-200 text-sm">

                        </button>
                        <button class="inline-flex items-center gap-2 text-slate-700 font-semibold border border-slate-200 hover:border-slate-300 px-6 py-3 rounded-xl text-sm bg-white">
                          <div class="w-6 h-6 bg-slate-900 rounded-full flex items-center justify-center text-white">

                        </button>
                      </div>

                      <div class="flex flex-wrap gap-x-5 gap-y-2 border-t border-slate-100 pt-6">
                        {/* Micro badges features matching recording exactly */}

                    </div>

                    {/* Phone Preview Mockup Device from Recording */}
                    <div class="relative mt-12 lg:mt-0 flex justify-center lg:justify-end">
                      <div class="relative w-64 h-[460px] bg-slate-900 rounded-[40px] shadow-2xl border-4 border-slate-700 overflow-hidden flex flex-col">

                        <div class="flex-1 bg-gradient-to-b from-slate-800 to-slate-900 p-5 pt-8 flex flex-col">
                          <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-1.5">
                              <SafeIcon name="Shield" size={14} className="text-green-400" />

                          </div>
                          <div class="text-white font-bold text-base leading-snug mb-1">Analyze Anything.</div>

                          <div class="bg-slate-700/60 rounded-xl p-3 flex items-center gap-2 mb-4">
                            <SafeIcon name="Search" size={12} className="text-slate-400" />
                            <span class="text-slate-400 text-xs">Paste a link or number...</span>
                          </div>
                          <div class="grid grid-cols-2 gap-2 mb-5">
                            {["Link", "Phone", "Email", "Doc"].map((lbl, idx) => (
                              <div key={lbl} class="bg-slate-700/50 rounded-xl p-2.5 flex flex-col items-center gap-1">
                                <span class="text-green-400"><SafeIcon name={idx === 0 ? "Link2" : idx === 1 ? "Phone" : idx === 2 ? "Mail" : "FileText"} size={14} /></span>

                              </div>
                            ))}
                          </div>
                          <div class="bg-green-600/20 border border-green-600/30 rounded-xl p-3">
                            <div class="flex items-center gap-2 mb-1">
                              <SafeIcon name="CheckCircle" size={12} class="text-green-400" />
                              <span class="text-green-400 text-xs font-semibold">Safe</span>
                            </div>
                            <div class="text-slate-300 text-xs">+234 812 345 6789</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* Pillars list */}
              <section class="py-16 bg-slate-50 border-t border-slate-100">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div class="text-center mb-12">
                    <h2 class="text-3xl font-extrabold text-slate-900 mb-3">Why people trust VeriLife</h2>
                    <p class="text-slate-500 text-sm max-w-md mx-auto">Three pillars that keep you protected across every digital interaction.</p>
                  </div>
                  <div class="grid sm:grid-cols-3 gap-6">
                    {[
                      { icon: "AlertTriangle", clr: "text-red-500", title: "Scam Protection", desc: "Real-time alerts before you fall victim.", bg: "bg-red-50 border-red-100", txt: "text-red-700" },
                      { icon: "Sparkles", clr: "text-green-600", title: "AI Decision Maker", desc: "Instant AI analysis of any input.", bg: "bg-green-50 border-green-100", txt: "text-green-700" },
                      { icon: "Globe", clr: "text-green-600", title: "Global Trust Network", desc: "Community-sourced reputation data.", bg: "bg-green-50 border-green-100", txt: "text-green-700" },
                    ].map(c => (
                      <div key={c.title} class={`rounded-2xl border p-6 ${c.bg}`}>
                        <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center shadow-sm mb-4">

              </footer>
            </div>
          ) : (
            /* ─── INTERACTIVE DASHBOARD VIEW FROM VIDEO ─── */
            <div class="flex h-screen bg-slate-100 overflow-hidden relative">
              {sidebarOpen && (
                <div class="fixed inset-0 bg-slate-900/40 z-40 lg:hidden backdrop-blur-xs" onClick={() => setSidebarOpen(false)} />

              {/* Sidebar Menu Panel */}
              <aside class={`fixed lg:static inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 flex flex-col transition-transform duration-200 ${sidebarOpen ? "translate-x-0" : "-translate-x-full lg:translate-x-0"}`}>

                      <SafeIcon name="Shield" size={15} strokeWidth={2.5} />
                    </div>
                    <span class="text-base font-bold text-slate-900">VeriLife</span>
                  </div>
                  <button class="lg:hidden text-slate-400 p-1" onClick={() => setSidebarOpen(false)}>
                    <SafeIcon name="X" size={18} />
                  </button>
                </div>

                <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
                  {[
                    { label: "Decision Maker", icon: "Sparkles", active: true },
                    { label: "Verifications", icon: "BadgeCheck" },
                    { label: "Scans", icon: "Search" },
                    { label: "Watchlist", icon: "BookMarked" },
                    { label: "My Reputation", icon: "User" },
                    { label: "Messages", icon: "MessageSquare", bdg: 3 },
                    { label: "Reports", icon: "ClipboardList" },
                    { label: "Settings", icon: "Settings" }
                  ].map(m => (
                    <button key={m.label} class={`w-full flex items-center justify-between px-3 py-2 rounded-xl text-sm font-medium ${m.active ? "bg-green-50 text-green-700" : "text-slate-600 hover:bg-slate-50"}`}>
                      <span class="flex items-center gap-3"><SafeIcon name={m.icon} size={16} />{m.label}</span>
                      {m.bdg && <span class="text-xs bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center font-bold">{m.bdg}</span>}
                    </button>
                  ))}
                </nav>

                {/* Premium Promo Card */}
                <div class="p-3 border-t border-slate-100">
                  <div class="bg-gradient-to-br from-green-600 to-green-800 rounded-xl p-4 text-white">
                    <div class="flex items-center gap-2 mb-1.5">
                      <SafeIcon name="Star" size={13} className="text-yellow-300" fill="#fde047" />
                      <span class="text-xs font-bold">Go Premium</span>
                    </div>
                    <p class="text-[11px] text-green-100 mb-3 leading-tight">Unlock unlimited security scanning endpoints.</p>
                    <button class="w-full bg-white text-green-700 text-xs font-bold py-1.5 rounded-md">Upgrade Now</button>
                  </div>
                </div>
              </aside>

              {/* Main Dashboard Layout Console */}
              <div class="flex-1 flex flex-col overflow-hidden">
                <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 flex-shrink-0">
                  <div class="flex items-center gap-3">
                    <button class="lg:hidden text-slate-500 p-1 rounded-md" onClick={() => setSidebarOpen(true)}>
                      <SafeIcon name="Menu" size={20} />
                    </button>
                    <h1 class="font-extrabold text-slate-900 text-base sm:text-lg">Decision Maker</h1>
                  </div>
                  <div class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center text-white text-sm font-bold">D</div>
                </header>

                <main class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
                  {/* Search Console Input Section */}
                  <div class="bg-white rounded-2xl p-4 sm:p-5 shadow-xs border border-slate-200">
                    <h2 class="text-xs font-semibold text-slate-400 mb-2.5">What do you want to analyze today?</h2>
                    <div class="flex items-center gap-3 border border-slate-200 rounded-xl px-3 py-1.5 bg-slate-50 mb-4">
                      <SafeIcon name="Search" size={15} className="text-slate-400" />
                      <input type="text" placeholder="Paste link, phone number, email, username..." class="flex-1 bg-transparent text-sm outline-none py-1" />
                      <button class="bg-green-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1"><SafeIcon name="Sparkles" size={12} /> Analyze</button>
                    </div>

                    <div class="flex flex-wrap gap-2">
                      {["Link", "Phone Number", "Email", "Username", "Document", "Text"].map((t, idx) => (
                        <button key={t} class={`flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-lg border ${idx === 0 ? "bg-green-50 border-green-300 text-green-700" : "bg-white border-slate-200 text-slate-500"}`}>

                  {/* 3-Column Performance Stats Deck */}

                    <div class="bg-white rounded-2xl p-4 shadow-xs border border-slate-200">
                      <div class="flex items-center justify-between mb-3">

                      </div>
                      <div class="space-y-2.5">
                        {[
                          { icon: "Phone", label: "+234 812 345 6789", type: "Phone", status: "Safe", col: "text-green-600 bg-green-50 border-green-200" },
                          { icon: "Mail", label: "joboffer@example.com", type: "Email", status: "Risky", col: "text-orange-600 bg-orange-50 border-orange-200" },
                          { icon: "Link2", label: "invest-winner.com", type: "Website", status: "Danger", col: "text-red-600 bg-red-50 border-red-200" }

                          <div key={chk} class="flex items-center gap-2 text-xs text-slate-600">

    // Secure application rendering initialization
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<VeriLifeApp />);

</body>
</html>
